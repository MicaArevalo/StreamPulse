name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test --no-build --configuration Release --filter "Category!=Integration" --verbosity normal

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Producer image
        run: docker build -f src/StreamPulse.Producer/Dockerfile -t streampulse-producer .

      - name: Build Processor image
        run: docker build -f src/StreamPulse.Processor/Dockerfile -t streampulse-processor .

      - name: Build Api image
        run: docker build -f src/StreamPulse.Api/Dockerfile -t streampulse-api .

      - name: Build Dashboard image
        run: docker build -f dashboard/Dockerfile -t streampulse-dashboard dashboard
